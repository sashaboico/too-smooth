<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="toosmooth-popup">
      <div class="toosmooth-brand">
        <span class="toosmooth-brand-name">TooSmooth</span>
        <span class="toosmooth-brand-sub">AI Phishing Detector</span>
      </div>
      <textarea
        id="ts-input"
        rows="7"
        placeholder="Paste an email or message here, then click Analyze…"
      ></textarea>
      <button id="ts-analyze" type="button">Analyze</button>
      <div id="ts-result"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
